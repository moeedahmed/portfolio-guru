[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -m "not kaizen and not live and not e2e"
markers =
    kaizen: live Kaizen browser tests that write draft events; require KAIZEN_LIVE_TESTS=1 and explicit -m kaizen
    live: live external-service tests, excluded from default runs
    e2e: end-to-end tests, excluded from default runs
