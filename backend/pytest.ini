[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker registration
markers =
    kaizen: live Kaizen integration tests (need KAIZEN_USERNAME/KAIZEN_PASSWORD, creates real drafts)
    e2e: end-to-end Telegram tests (need TELETHON_SESSION)
    live: live Telegram tests (manual only)

# Default: exclude live integration tests that hit real services
addopts = -m "not kaizen and not e2e and not live"
