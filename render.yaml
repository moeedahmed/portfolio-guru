services:
  - type: web
    name: portfolio-guru
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    disk:
      name: portfolio-guru-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FERNET_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////data/portfolio_guru.db
      - key: DB_PATH
        value: /data/portfolio_guru.db
