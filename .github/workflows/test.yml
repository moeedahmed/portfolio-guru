name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
# Throwaway, CI-only Fernet key. Must be a valid 32-byte url-safe base64 key
      # (the literal "test" is not, which silently broke every credential-encrypt
      # test in CI). Encrypts only synthetic test data — never real secrets.
      FERNET_SECRET_KEY: "5Wv33F9sq99WGD2lEzwwd3J_JH5p6vxKdDiAwCWqoYQ="
      TELEGRAM_BOT_TOKEN: fake
      GOOGLE_API_KEY: fake
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run non-E2E tests
        run: python -m pytest tests/ -v --ignore=tests/test_e2e.py

  e2e:
    runs-on: ubuntu-latest
    env:
# Throwaway, CI-only Fernet key. Must be a valid 32-byte url-safe base64 key
      # (the literal "test" is not, which silently broke every credential-encrypt
      # test in CI). Encrypts only synthetic test data — never real secrets.
      FERNET_SECRET_KEY: "5Wv33F9sq99WGD2lEzwwd3J_JH5p6vxKdDiAwCWqoYQ="
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_PORTFOLIO }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TELETHON_API_ID: ${{ secrets.TELETHON_API_ID }}
      TELETHON_API_HASH: ${{ secrets.TELETHON_API_HASH }}
      TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
      TELEGRAM_BOT_USERNAME: PortfolioGuruBot
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - name: Check E2E secrets
        id: e2e-secrets
        shell: bash
        run: |
          if [[ -n "$TELETHON_API_ID" && -n "$TELETHON_API_HASH" && -n "$TELETHON_SESSION" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "E2E secrets are not configured; skipping E2E tests."
          fi
      - uses: actions/setup-python@v6
        if: steps.e2e-secrets.outputs.available == 'true'
        with:
          python-version: "3.14"
      - name: Install dependencies
        if: steps.e2e-secrets.outputs.available == 'true'
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run E2E tests
        if: steps.e2e-secrets.outputs.available == 'true'
        run: python -m pytest tests/ -v -m e2e
